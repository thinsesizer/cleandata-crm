version: '3.8'

services:
  app:
    image: cleandata/crm:latest
    container_name: cleandata-crm
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # These are set in .env file
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-file:./data/crm.db}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - SALESFORCE_CLIENT_ID=${SALESFORCE_CLIENT_ID}
      - SALESFORCE_CLIENT_SECRET=${SALESFORCE_CLIENT_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    networks:
      - cleandata-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Add PostgreSQL if user wants better performance
  # Just uncomment this section and update DATABASE_URL in .env
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: cleandata-db
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: cleandata
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
  #     POSTGRES_DB: crm
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - cleandata-network
  #   ports:
  #     - "5432:5432"

  # Optional: Add Redis for caching
  # redis:
  #   image: redis:7-alpine
  #   container_name: cleandata-redis
  #   restart: unless-stopped
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - cleandata-network
  #   ports:
  #     - "6379:6379"

networks:
  cleandata-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: